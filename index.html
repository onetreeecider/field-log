<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>One Tree Field Log</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" />
<style>
  :root {
    --cream:#FBF6EC; --paper:#FFFFFF; --bark:#3B2E22; --bark-soft:#6B5D4B;
    --gold:#C9862B; --gold-deep:#A76B18; --gold-pale:#F6EAD3;
    --leaf:#4A6B4F; --leaf-deep:#2F4A33; --leaf-pale:#E4EDE4;
    --apple:#B8402F; --apple-pale:#F7E4E0; --line:#EADFCB;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--cream); color:var(--bark); font-family:Inter,-apple-system,sans-serif; min-height:100vh; }
  .wrap { max-width:520px; margin:0 auto; padding-bottom:90px; }

  header { position:sticky; top:0; z-index:10; background:var(--leaf-deep);
    padding:14px 20px; display:flex; align-items:center; gap:12px;
    box-shadow:0 2px 10px rgba(47,74,51,.25); }
  .brand { font-family:Fraunces,serif; font-weight:900; font-size:19px; line-height:1.05; color:#F6EAD3; }
  .brand span { color:var(--gold); }
  .tag { font-size:10.5px; color:#BFCDbf; letter-spacing:.14em; margin-top:3px; text-transform:uppercase; }
  .btn { border:none; cursor:pointer; font-family:Inter,sans-serif; font-weight:700; }
  .btn-back { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.12);
    border:1.5px solid rgba(255,255,255,.25); color:#F6EAD3; font-size:16px; flex-shrink:0; }
  .btn-primary { width:100%; padding:15px; border-radius:14px; background:var(--gold); color:#fff; font-size:16px;
    box-shadow:0 4px 14px rgba(201,134,43,.35); }
  .btn-primary:disabled { background:var(--bark-soft); box-shadow:none; }
  .btn-ghost { padding:15px 20px; border-radius:14px; background:var(--paper); color:var(--bark-soft);
    border:1.5px solid var(--line); font-weight:600; }

  .page { padding:16px 20px; }
  h2 { font-family:Fraunces,serif; font-weight:900; font-size:26px; margin-bottom:6px; }

  /* home */
  .hero { text-align:center; padding:30px 20px 8px; }
  .hero svg { width:92px; height:92px; }
  .hero-title { font-family:Fraunces,serif; font-weight:900; font-size:30px; line-height:1.05; margin-top:10px; }
  .hero-title span { color:var(--gold); }
  .hero-sub { font-size:11px; letter-spacing:.22em; color:var(--bark-soft); text-transform:uppercase; margin-top:6px; }
  .tiles { padding:22px 20px; display:flex; flex-direction:column; gap:14px; }
  .tile { display:flex; align-items:center; gap:16px; text-align:left; padding:20px 18px; border-radius:20px;
    border:1.5px solid var(--line); background:var(--paper); box-shadow:0 3px 12px rgba(59,46,34,.07); }
  .tile-big { background:linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%); border:none;
    box-shadow:0 6px 18px rgba(201,134,43,.4); }
  .tile-big .t-name { color:#fff; } .tile-big .t-sub { color:#F6EAD3; }
  .t-icon { width:46px; height:46px; flex-shrink:0; }
  .t-name { font-family:Fraunces,serif; font-weight:900; font-size:20px; color:var(--bark); }
  .t-sub { font-size:12.5px; color:var(--bark-soft); margin-top:2px; }

  .search { width:100%; padding:12px 18px; border-radius:999px; border:1.5px solid var(--line);
    background:var(--paper); font-size:16px; margin-bottom:14px; outline:none; }

  .card { background:var(--paper); border:1.5px solid var(--line); border-radius:16px; padding:15px; margin-bottom:11px;
    width:100%; text-align:left; display:block; box-shadow:0 2px 8px rgba(59,46,34,.05); }
  .card-name { font-family:Fraunces,serif; font-weight:700; font-size:18px; }
  .card-sub { font-size:13px; color:var(--bark-soft); margin-top:2px; }
  .card-meta { font-size:12px; color:var(--bark-soft); margin-top:5px; }
  .row-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }

  .chip { display:inline-block; padding:3px 9px; border-radius:999px; font-size:11.5px; font-weight:600; letter-spacing:.02em; }
  .chip-leaf { background:var(--leaf-pale); color:var(--leaf); }
  .chip-gold { background:var(--gold-pale); color:var(--gold-deep); }
  .chip-apple { background:var(--apple-pale); color:var(--apple); }
  .chip-mute { background:#F1EDE4; color:var(--bark-soft); }

  label.field { display:block; margin-bottom:15px; }
  label.field .lbl, .lbl2 { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--bark-soft); margin-bottom:5px; }
  input, textarea { width:100%; padding:12px 14px; border-radius:12px; border:1.5px solid var(--line);
    background:var(--paper); font-size:16px; font-family:Inter,sans-serif; color:var(--bark); outline:none; }
  textarea { min-height:90px; resize:vertical; }

  .type-row { display:flex; gap:8px; flex-wrap:wrap; }
  .type-btn { padding:9px 14px; border-radius:999px; font-size:14px; font-weight:600; border:1.5px solid var(--line);
    background:var(--paper); color:var(--bark-soft); }
  .type-btn.on { background:var(--leaf); border-color:var(--leaf); color:#fff; }

  .order-box { background:var(--gold-pale); border:1.5px solid var(--line); border-radius:16px; padding:15px; margin-bottom:15px; }
  .order-box .lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--gold-deep); margin-bottom:12px; }
  .fl-group { font-size:10.5px; font-weight:700; letter-spacing:.1em; color:var(--gold-deep); margin:8px 0 5px; }
  .stepper { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .stepper button { width:40px; height:40px; border-radius:50%; font-size:20px; font-weight:700; border:none; }
  .step-minus { background:#fff; color:var(--gold-deep); border:1.5px solid var(--line) !important; }
  .step-plus { background:var(--gold); color:#fff; }
  .step-val { font-family:Fraunces,serif; font-weight:900; font-size:22px; width:44px; text-align:center; }

  .followup { width:100%; padding:13px; border-radius:14px; font-size:14px; font-weight:600; margin-bottom:15px;
    background:var(--paper); color:var(--bark-soft); border:1.5px solid var(--line); }
  .followup.on { background:var(--apple-pale); color:var(--apple); border-color:var(--apple); }

  .section-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em;
    color:var(--bark-soft); margin:20px 0 8px; }
  .visit-notes { font-size:14px; margin-top:6px; }
  .visit-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:7px; }
  .detail-line { font-size:14px; margin-bottom:3px; }
  .detail-line a { color:var(--gold-deep); font-weight:600; text-decoration:none; }
  .muted { color:var(--bark-soft); }

  .price-row { display:flex; justify-content:space-between; align-items:baseline; padding:14px 4px;
    border-bottom:1.5px solid var(--line); }
  .price-item { font-weight:600; font-size:15px; }
  .price-note { font-size:12px; color:var(--bark-soft); margin-top:2px; }
  .price-val { font-family:Fraunces,serif; font-weight:900; font-size:20px; color:var(--gold-deep); white-space:nowrap; margin-left:12px; }

  .price-sec { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.16em;
    color:var(--gold-deep); margin:18px 2px 10px; }
  .pcard { background:var(--paper); border:1.5px solid var(--line); border-radius:20px; padding:18px;
    margin-bottom:14px; box-shadow:0 4px 14px rgba(59,46,34,.08); }
  .pcard-title { font-family:Fraunces,serif; font-weight:900; font-size:21px; margin-bottom:10px; }
  .p-big { font-family:Fraunces,serif; font-weight:900; font-size:34px; color:var(--gold-deep); line-height:1; }
  .p-big small { font-size:13px; font-family:Inter,sans-serif; font-weight:600; color:var(--bark-soft); letter-spacing:.05em; }
  .p-stats { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .p-stat { flex:1; min-width:86px; background:var(--gold-pale); border-radius:12px; padding:9px 10px; text-align:center; }
  .p-stat .v { font-family:Fraunces,serif; font-weight:900; font-size:18px; color:var(--bark); }
  .p-stat .k { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--bark-soft); margin-top:2px; }
  .p-flavors { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
  .p-tier { padding:12px 0; border-top:1.5px dashed var(--line); }
  .p-tier:first-of-type { border-top:none; padding-top:4px; }

  .empty { text-align:center; margin-top:50px; }
  .empty p:first-child { font-family:Fraunces,serif; font-size:20px; font-weight:700; }
  .empty p:last-child { font-size:14px; color:var(--bark-soft); margin-top:4px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--bark); color:var(--cream);
    padding:12px 22px; border-radius:999px; font-size:14px; font-weight:600; z-index:99; box-shadow:0 6px 20px rgba(0,0,0,.25);
    opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; }
  .toast.err { background:var(--apple); color:#fff; }
  .spinner { text-align:center; padding:36px 0; color:var(--bark-soft); font-size:14px; }
  .btn-row { display:flex; gap:10px; margin-top:8px; }
  .btn-row .btn-primary { flex:1; }
  .divider { border:none; border-top:1.5px dashed var(--line); margin:20px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header id="hdr">
    <button class="btn btn-back" id="backBtn" style="display:none">←</button>
    <div>
      <div class="brand">One Tree <span>Hard Cider</span></div>
      <div class="tag">Field Log</div>
    </div>
  </header>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  SETUP
// ══════════════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby57i2dEAGTwuuCqSv0IjwAXQILiHqSBP3-NXkhoorAREGQ_cmSQN6L0FfM6Jtu1RUQWA/exec";
const SECRET     = "cider2026";   // matches the SECRET line in your Apps Script

// Edit these lists anytime — add/remove flavors as the lineup changes.
const FLAVOR_GROUPS = [
  { label: "CORE", flavors: ["Lemon Basil", "Huckleberry", "Imperial Prickly Pear", "Imperial Pineapple", "Crisp Apple"] },
  { label: "SEASONAL", flavors: ["Mimosa", "Lemon Berry", "Passion Guava", "Cranberry"] },
  { label: "SPECIAL RELEASES", flavors: ["Heartbreaker", "St. Paddy's Pressed", "Cider & Stripes", "Caramel Cinnamon", "Pumpkin", "Snowglobe"] },
];
const FORMATS = ["Cans", "Bottles", "1/6 Keg", "1/2 Keg", "20L Keg"];
const KINDS = ["Ordered", "Dropped off", "Sample"];

// Sales sheets: upload images (.png/.jpg) to the "sheets" folder in the GitHub repo
// and they appear in the app automatically — no code changes needed.
const GH_USER = "onetreeecider";
const GH_REPO = "field-log";
const GH_FOLDER = "sheets";
// ══════════════════════════════════════════════════════════════

const TREE_SVG = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="38" r="26" fill="#4A6B4F"/>
  <circle cx="30" cy="46" r="17" fill="#4A6B4F"/>
  <circle cx="70" cy="46" r="17" fill="#4A6B4F"/>
  <circle cx="50" cy="30" r="18" fill="#5B7D5F"/>
  <rect x="45" y="58" width="10" height="26" rx="4" fill="#6B4A2B"/>
  <path d="M50 62 Q38 56 30 60" stroke="#6B4A2B" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="38" cy="34" r="4" fill="#C9862B"/>
  <circle cx="62" cy="40" r="4" fill="#B8402F"/>
  <circle cx="52" cy="48" r="4" fill="#C9862B"/>
  <ellipse cx="50" cy="90" rx="26" ry="4" fill="#EADFCB"/>
</svg>`;
const STOP_ICON = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M24 4C15 4 8 11 8 20c0 11 16 24 16 24s16-13 16-24c0-9-7-16-16-16z" fill="#fff" opacity=".95"/><circle cx="24" cy="20" r="7" fill="#A76B18"/></svg>`;
const PRICE_ICON = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="6" width="32" height="36" rx="4" fill="#E4EDE4"/><rect x="14" y="14" width="20" height="3" rx="1.5" fill="#4A6B4F"/><rect x="14" y="22" width="14" height="3" rx="1.5" fill="#4A6B4F"/><rect x="14" y="30" width="17" height="3" rx="1.5" fill="#4A6B4F"/><circle cx="34" cy="34" r="9" fill="#C9862B"/><text x="34" y="38.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="Arial">$</text></svg>`;
const BOOK_ICON = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="8" width="30" height="32" rx="4" fill="#F6EAD3"/><rect x="9" y="8" width="8" height="32" rx="3" fill="#C9862B"/><rect x="22" y="16" width="12" height="3" rx="1.5" fill="#A76B18"/><rect x="22" y="23" width="12" height="3" rx="1.5" fill="#A76B18"/></svg>`;
const FLAG_ICON = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="12" y="6" width="4" height="36" rx="2" fill="#6B4A2B"/><path d="M16 8h20l-5 7 5 7H16z" fill="#B8402F"/></svg>`;
const SHEETS_ICON = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="10" width="26" height="30" rx="4" fill="#E4EDE4"/><rect x="14" y="4" width="26" height="30" rx="4" fill="#F6EAD3" stroke="#C9862B" stroke-width="2"/><circle cx="23" cy="14" r="4" fill="#C9862B"/><path d="M16 28l7-8 6 6 4-4 7 8v0a4 4 0 01-4 4H20a4 4 0 01-4-4z" fill="#4A6B4F"/></svg>`;

let accounts = [];
let visitsByAccount = {};
let pricing = null;
let view = { name: "home" };
let search = "";

const app = document.getElementById("app");
const backBtn = document.getElementById("backBtn");
const toastEl = document.getElementById("toast");

function toast(msg, isErr) {
  toastEl.textContent = msg;
  toastEl.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => toastEl.classList.remove("show"), 2400);
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}
function fmtDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(String(iso).slice(0,10) + "T12:00:00");
    return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  } catch { return iso; }
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function sortAccounts() {
  accounts.sort((a,b) => String(a.name).localeCompare(String(b.name), undefined, {sensitivity:"base"}));
}

// ── API ──
async function apiGet(params) {
  const q = new URLSearchParams(Object.assign({ secret: SECRET }, params));
  const res = await fetch(SCRIPT_URL + "?" + q.toString());
  return res.json();
}
async function apiPost(body) {
  body.secret = SECRET;
  const res = await fetch(SCRIPT_URL, { method:"POST", body: JSON.stringify(body) });
  return res.json();
}
async function loadAccounts() {
  try {
    const data = await apiGet({ action: "getAccounts" });
    if (data.error) throw new Error(data.error);
    accounts = data.accounts || [];
    sortAccounts();
  } catch (e) {
    toast("Couldn't load accounts — check signal", true);
  }
}
async function loadVisits(accountId) {
  try {
    const data = await apiGet({ action: "getVisits", accountId });
    if (!data.error) visitsByAccount[accountId] = data.visits || [];
  } catch (e) {}
}

// Quietly grab GPS when a stop form opens; returns a getter for "lat,lng" (or "" if unavailable)
function startGeo() {
  let loc = "";
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => { loc = p.coords.latitude.toFixed(6) + "," + p.coords.longitude.toFixed(6); },
      () => {},   // denied or unavailable — save proceeds without location
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 120000 }
    );
  }
  return () => loc;
}

// ── NAV ──
function go(v) { view = v; render(); }
backBtn.onclick = () => {
  const map = {
    stopPick: { name:"home" }, accounts: { name:"home" }, pricing: { name:"home" },
    followups: { name:"home" }, resources: { name:"home" },
    account: { name:"accounts" }, newCombo: { name:"stopPick" },
    accountForm: view.id ? { name:"account", id:view.id } : { name:"accounts" },
    visitForm: view.from === "pick" ? { name:"stopPick" } : { name:"account", id:view.id },
  };
  go(map[view.name] || { name:"home" });
};

function render() {
  backBtn.style.display = view.name === "home" ? "none" : "";
  const r = {
    home: renderHome, stopPick: renderStopPick, accounts: renderAccounts,
    account: renderAccount, accountForm: renderAccountForm,
    visitForm: renderVisitForm, newCombo: renderNewCombo, pricing: renderPricing,
    followups: renderFollowups, resources: renderResources,
  };
  (r[view.name] || renderHome)();
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
// HOME
// ─────────────────────────────────────────────
function renderHome() {
  app.innerHTML = `
    <div class="hero">
      ${TREE_SVG}
      <div class="hero-title">One Tree <span>Hard Cider</span></div>
      <div class="hero-sub">Field Log · Spokane Valley</div>
    </div>
    <div class="tiles">
      <button class="tile tile-big" onclick="goStopPick()">
        <div class="t-icon">${STOP_ICON}</div>
        <div><div class="t-name">Log Stop</div><div class="t-sub">Record a visit, order, drop, or sample</div></div>
      </button>
      <button class="tile" onclick="goPricing()">
        <div class="t-icon">${PRICE_ICON}</div>
        <div><div class="t-name">Pricing</div><div class="t-sub">Current keg, can &amp; bottle prices</div></div>
      </button>
      <button class="tile" onclick="goSheets()">
        <div class="t-icon">${SHEETS_ICON}</div>
        <div><div class="t-name">Sales Sheets</div><div class="t-sub">Sell sheets to show, text, or email</div></div>
      </button>
      <button class="tile" onclick="goFollowups()">
        <div class="t-icon">${FLAG_ICON}</div>
        <div><div class="t-name">Follow-ups</div><div class="t-sub">Accounts waiting on you</div></div>
      </button>
      <button class="tile" onclick="goAccounts()">
        <div class="t-icon">${BOOK_ICON}</div>
        <div><div class="t-name">Accounts</div><div class="t-sub">Browse history &amp; contact info</div></div>
      </button>
    </div>`;
}
window.goStopPick = () => { search = ""; go({ name:"stopPick" }); };
window.goPricing = () => go({ name:"pricing" });
window.goAccounts = () => { search = ""; go({ name:"accounts" }); };
window.goFollowups = () => go({ name:"followups" });
window.goSheets = () => go({ name:"resources" });

// ─────────────────────────────────────────────
// ACCOUNT LIST (two flavors: pick-for-stop, and browse)
// ─────────────────────────────────────────────
function accountListHTML(mode) {
  const q = search.trim().toLowerCase();
  const filtered = accounts.filter(a =>
    !q || (a.name||"").toLowerCase().includes(q) || (a.contact||"").toLowerCase().includes(q) || (a.address||"").toLowerCase().includes(q)
  );
  let html = "";
  if (accounts.length === 0) {
    html = `<div class="empty"><p>No accounts yet</p><p>${mode==="pick" ? "Tap “New account” to add your first stop." : "Add accounts from the Log Stop screen."}</p></div>`;
  } else if (!filtered.length) {
    html = `<div class="empty"><p>No matches</p><p>Try a different search.</p></div>`;
  } else {
    for (const a of filtered) {
      const v = visitsByAccount[a.id];
      const last = v && v.length ? v[0] : null;
      const action = mode === "pick" ? `pickAccount('${a.id}')` : `openAccount('${a.id}')`;
      html += `<button class="card" onclick="${action}">
        <div class="row-top">
          <div class="card-name">${esc(a.name)}</div>
          <span class="chip chip-leaf">${esc(a.type || "Account")}</span>
        </div>
        ${a.contact ? `<div class="card-sub">${esc(a.contact)}</div>` : ""}
        ${last ? `<div class="card-meta">Last stop ${fmtDate(last.date)}${last.followUp ? " · needs follow-up" : ""}</div>` : ""}
      </button>`;
    }
  }
  return html;
}
function wireSearch(rerender) {
  const box = document.getElementById("searchBox");
  box.oninput = e => {
    search = e.target.value; rerender();
    const nb = document.getElementById("searchBox");
    nb.focus(); nb.setSelectionRange(nb.value.length, nb.value.length);
  };
}

function renderStopPick() {
  app.innerHTML = `<div class="page">
    <h2 style="margin-bottom:12px">Log a stop</h2>
    <button class="btn btn-primary" style="margin-bottom:14px" onclick="goNewCombo()">+ New account &amp; first stop</button>
    <input class="search" placeholder="Search accounts…" value="${esc(search)}" id="searchBox" />
    ${accountListHTML("pick")}
  </div>`;
  wireSearch(renderStopPick);
}

function wireVisitFields() {
  let orderItems = [], selFlavor = null, selFormat = null, qty = 1, selKind = "Ordered", followUp = false;
  const qtyV = document.getElementById("qtyV");
  document.getElementById("qtyM").onclick = () => { qty = Math.max(1, qty-1); qtyV.textContent = qty; };
  document.getElementById("qtyP").onclick = () => { qty++; qtyV.textContent = qty; };
  document.querySelectorAll("#flavorRow .type-btn").forEach(b => b.onclick = () => {
    selFlavor = b.dataset.flavor;
    document.querySelectorAll("#flavorRow .type-btn").forEach(x => x.classList.toggle("on", x === b));
  });
  document.querySelectorAll("#formatRow .type-btn").forEach(b => b.onclick = () => {
    selFormat = b.dataset.format;
    document.querySelectorAll("#formatRow .type-btn").forEach(x => x.classList.toggle("on", x === b));
  });
  document.querySelectorAll("#kindRow .type-btn").forEach(b => b.onclick = () => {
    selKind = b.dataset.kind;
    document.querySelectorAll("#kindRow .type-btn").forEach(x => x.classList.toggle("on", x === b));
  });
  function drawItems() {
    const el = document.getElementById("orderItems");
    if (!orderItems.length) { el.innerHTML = ""; return; }
    const cls = { "Ordered":"chip-gold", "Dropped off":"chip-leaf", "Sample":"chip-apple" };
    el.innerHTML = orderItems.map((it, i) =>
      `<div style="display:flex;justify-content:space-between;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:9px 12px;margin-bottom:6px">
        <span style="font-size:14px;font-weight:600">${it.qty} × ${esc(it.format)} — ${esc(it.flavor)}
          <span class="chip ${cls[it.kind]}" style="margin-left:6px">${esc(it.kind)}</span></span>
        <button data-rm="${i}" style="border:none;background:var(--apple-pale);color:var(--apple);border-radius:50%;width:26px;height:26px;font-weight:700">✕</button>
      </div>`).join("");
    el.querySelectorAll("[data-rm]").forEach(b => b.onclick = () => {
      orderItems.splice(Number(b.dataset.rm), 1); drawItems();
    });
  }
  document.getElementById("addItem").onclick = () => {
    if (!selFlavor) return toast("Pick a flavor first", true);
    if (!selFormat) return toast("Pick a format", true);
    orderItems.push({ flavor: selFlavor, format: selFormat, qty, kind: selKind });
    selFlavor = null; selFormat = null; qty = 1; qtyV.textContent = 1;
    document.querySelectorAll("#flavorRow .type-btn, #formatRow .type-btn").forEach(x => x.classList.remove("on"));
    drawItems();
  };
  const fBtn = document.getElementById("v_follow");
  fBtn.onclick = () => {
    followUp = !followUp;
    fBtn.classList.toggle("on", followUp);
    fBtn.textContent = followUp ? "● Needs follow-up" : "○ Mark for follow-up";
  };
  return function readVisit() {
    const fmt = (arr) => arr.map(it => `${it.qty} × ${it.format} — ${it.flavor}`).join("; ");
    return {
      date: document.getElementById("v_date").value,
      spokeWith: document.getElementById("v_spoke").value.trim(),
      odomRep: document.getElementById("v_odom").value.trim(),
      notes: document.getElementById("v_notes").value.trim(),
      ordered: fmt(orderItems.filter(it => it.kind === "Ordered")),
      dropped: fmt(orderItems.filter(it => it.kind === "Dropped off")),
      samples: fmt(orderItems.filter(it => it.kind === "Sample")),
      followUp,
    };
  };
}

async function renderPricing() {
  if (pricing === null) {
    app.innerHTML = `<div class="page"><h2>Pricing</h2><div class="spinner">Loading prices…</div></div>`;
    try {
      const data = await apiGet({ action: "getPricing" });
      pricing = data.pricing || [];
    } catch (e) {
      pricing = null;
      app.innerHTML = `<div class="page"><h2>Pricing</h2><div class="card muted" style="font-size:14px">Couldn't load prices — check signal and reopen.</div></div>`;
      return;
    }
    if (view.name !== "pricing") return;
  }
  const money = (v) => v ? "$" + esc(String(v).replace(/^\$/, "")) : "";
  const flavorChips = (s) => !s ? "" : `<div class="p-flavors">` +
    String(s).split(",").map(f => f.trim()).filter(Boolean)
      .map(f => `<span class="chip chip-leaf">${esc(f)}</span>`).join("") + `</div>`;

  const packaged = pricing.filter(p => (p.section || "").toLowerCase().startsWith("pack"));
  const draftRows = pricing.filter(p => (p.section || "").toLowerCase().startsWith("draft"));

  let html = `<div class="page"><h2 style="margin-bottom:2px">Pricing</h2>`;

  if (packaged.length) {
    html += `<div class="price-sec">Packaged</div>`;
    for (const p of packaged) {
      const stats = [
        p.perPkg ? `<div class="p-stat"><div class="v">${money(p.perPkg)}</div><div class="k">Per pack</div></div>` : "",
        p.perCan ? `<div class="p-stat"><div class="v">${money(p.perCan)}</div><div class="k">Per can</div></div>` : "",
        p.srp    ? `<div class="p-stat"><div class="v">${money(p.srp)}</div><div class="k">SRP</div></div>` : "",
      ].join("");
      html += `<div class="pcard">
        <div class="pcard-title">${esc(p.pkg)}</div>
        ${p.casePrice ? `<div class="p-big">${money(p.casePrice)} <small>/ CASE</small></div>` : ""}
        ${stats ? `<div class="p-stats">${stats}</div>` : ""}
        ${flavorChips(p.flavors)}
      </div>`;
    }
  }

  if (draftRows.length) {
    html += `<div class="price-sec">Draft</div>`;
    // group tiers by package, preserving sheet order
    const order = [], groups = {};
    for (const p of draftRows) {
      if (!groups[p.pkg]) { groups[p.pkg] = []; order.push(p.pkg); }
      groups[p.pkg].push(p);
    }
    for (const pkg of order) {
      html += `<div class="pcard"><div class="pcard-title">${esc(pkg)}</div>`;
      for (const t of groups[pkg]) {
        if (!t.tier && !t.flavors) continue;
        html += `<div class="p-tier">
          ${t.tier ? `<div class="p-big">${money(t.tier)}</div>` : ""}
          ${flavorChips(t.flavors)}
        </div>`;
      }
      html += `</div>`;
    }
  }

  if (!packaged.length && !draftRows.length) {
    html += `<div class="card muted" style="font-size:14px;margin-top:12px">No prices yet — fill in the Pricing tab in the spreadsheet.</div>`;
  }
  html += `</div>`;
  app.innerHTML = html;
}

async function renderFollowups() {
  app.innerHTML = `<div class="page"><h2>Follow-ups</h2><div class="spinner">Checking who's waiting on you…</div></div>`;
  let visits = [];
  try {
    const data = await apiGet({ action: "getVisits" });
    if (data.error) throw new Error(data.error);
    visits = (data.visits || []).filter(v => v.followUp);
  } catch (e) {
    app.innerHTML = `<div class="page"><h2>Follow-ups</h2><div class="card muted" style="font-size:14px">Couldn't load — check signal and reopen.</div></div>`;
    return;
  }
  if (view.name !== "followups") return;
  drawFollowups(visits);
}
function drawFollowups(visits) {
  let html = `<div class="page"><h2 style="margin-bottom:12px">Follow-ups</h2>`;
  if (!visits.length) {
    html += `<div class="empty"><p>All caught up 🍎</p><p>No accounts are flagged for follow-up.</p></div>`;
  } else {
    for (const v of visits) {
      const days = Math.max(0, Math.floor((new Date() - new Date(String(v.date).slice(0,10) + "T12:00:00")) / 86400000));
      const dayTxt = days === 0 ? "Flagged today" : days === 1 ? "1 day ago" : days + " days ago";
      html += `<div class="card" id="fu-${v.row}">
        <div class="row-top">
          <div class="card-name">${esc(v.accountName)}</div>
          <span class="chip chip-apple">${dayTxt}</span>
        </div>
        <div class="card-sub">Stop on ${fmtDate(v.date)}${v.spokeWith ? " · spoke with " + esc(v.spokeWith) : ""}</div>
        ${v.notes ? `<div class="visit-notes">${esc(v.notes)}</div>` : `<div class="visit-notes muted">No note on this one.</div>`}
        <div class="btn-row" style="margin-top:12px">
          <button class="btn btn-primary" style="padding:11px;font-size:14px" onclick="openAccount('${esc(v.accountId)}')">Open account</button>
          <button class="btn btn-ghost" style="padding:11px 14px;font-size:14px" onclick="clearFollowup(${v.row}, '${esc(v.accountId)}')">✓ Done</button>
        </div>
      </div>`;
    }
  }
  html += `</div>`;
  app.innerHTML = html;
}
window.clearFollowup = async function(row, accountId) {
  const card = document.getElementById("fu-" + row);
  if (card) card.style.opacity = "0.45";
  try {
    const r = await apiPost({ action: "clearFollowUp", row, accountId });
    if (r.error) throw new Error(r.error);
    if (card) card.remove();
    delete visitsByAccount[accountId];   // stale — reload next time it's viewed
    toast("Follow-up cleared");
    if (!document.querySelector("[id^='fu-']")) drawFollowups([]);
  } catch (e) {
    if (card) card.style.opacity = "1";
    toast("Couldn't clear — try again", true);
  }
};

let resources = null;
async function renderResources() {
  if (resources === null) {
    app.innerHTML = `<div class="page"><h2>Sales Sheets</h2><div class="spinner">Loading sheets…</div></div>`;
    try {
      const res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FOLDER}`);
      if (!res.ok) throw new Error("no folder");
      const files = await res.json();
      resources = files.filter(f => /\.(png|jpe?g|gif|webp)$/i.test(f.name))
        .map(f => ({
          name: f.name.replace(/\.[^.]+$/, "").replace(/[-_]+/g, " "),
          url: `https://${GH_USER}.github.io/${GH_REPO}/${GH_FOLDER}/${encodeURIComponent(f.name)}`,
        }));
    } catch (e) {
      resources = [];
    }
    if (view.name !== "resources") return;
  }
  let html = `<div class="page"><h2 style="margin-bottom:12px">Sales Sheets</h2>`;
  if (!resources.length) {
    html += `<div class="card muted" style="font-size:14px">No sheets yet. Upload images to the <b>${esc(GH_FOLDER)}</b> folder in the GitHub repo and they'll show up here automatically.</div>`;
  } else {
    for (let i = 0; i < resources.length; i++) {
      const r = resources[i];
      html += `<button class="card" style="padding:0;overflow:hidden" onclick="openSheet(${i})">
        <img src="${r.url}" alt="${esc(r.name)}" style="width:100%;display:block;max-height:220px;object-fit:cover" loading="lazy" />
        <div style="padding:12px 15px;font-family:Fraunces,serif;font-weight:700;font-size:16px;text-transform:capitalize">${esc(r.name)}</div>
      </button>`;
    }
  }
  html += `</div>`;
  app.innerHTML = html;
}
window.openSheet = function(i) {
  const r = resources[i];
  const subject = encodeURIComponent("One Tree Hard Cider — " + r.name);
  const bodyTxt = encodeURIComponent("Here's our " + r.name + " sheet: " + r.url);
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;z-index:60;background:rgba(30,24,16,.93);display:flex;flex-direction:column;padding:14px;";
  overlay.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="color:#F6EAD3;font-family:Fraunces,serif;font-weight:700;font-size:17px;text-transform:capitalize">${esc(r.name)}</div>
      <button id="sheetClose" style="border:none;background:rgba(255,255,255,.15);color:#F6EAD3;border-radius:50%;width:34px;height:34px;font-size:16px;font-weight:700">✕</button>
    </div>
    <div style="flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center">
      <img src="${r.url}" style="max-width:100%;border-radius:12px" />
    </div>
    <div style="text-align:center;color:#BFCDbf;font-size:12px;margin:10px 0 8px">Press and hold the image to save it to your phone</div>
    <div style="display:flex;gap:10px">
      <a href="mailto:?subject=${subject}&body=${bodyTxt}" style="flex:1;text-align:center;padding:13px;border-radius:12px;background:var(--gold);color:#fff;font-weight:700;text-decoration:none;font-size:14px">Email</a>
      <a href="sms:?&body=${bodyTxt}" style="flex:1;text-align:center;padding:13px;border-radius:12px;background:var(--leaf);color:#fff;font-weight:700;text-decoration:none;font-size:14px">Text</a>
      <a href="${r.url}" target="_blank" style="flex:1;text-align:center;padding:13px;border-radius:12px;background:rgba(255,255,255,.14);color:#F6EAD3;font-weight:700;text-decoration:none;font-size:14px">Open</a>
    </div>`;
  overlay.querySelector("#sheetClose").onclick = () => overlay.remove();
  document.body.appendChild(overlay);
};

// ── boot ──
(async function init() {
  renderHome();
  await loadAccounts();
  if (view.name === "home") renderHome();
})();
</script>
</body>
</html>
